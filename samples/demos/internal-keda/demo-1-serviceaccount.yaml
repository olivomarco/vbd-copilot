# =============================================================================
# demo-1-serviceaccount.yaml
# Purpose : Kubernetes ServiceAccount annotated for Azure Workload Identity.
#           The Azure Workload Identity mutating webhook reads the annotation
#           and label at pod admission time, then injects a projected OIDC
#           token volume into every pod that references this ServiceAccount.
#
# Usage   : kubectl apply -f demo-1-serviceaccount.yaml
#
# Prerequisites:
#   - AKS cluster created with --enable-workload-identity and --enable-oidc-issuer
#   - Managed Identity already created (az identity create)
#   - Federated credential created for this ServiceAccount subject:
#       system:serviceaccount:keda-dotnet-sample:order-processor-sa
#
# Substitute before applying:
#   Replace <MI_CLIENT_ID> with the output of:
#     az identity show --name mi-keda-demo --resource-group rg-keda-demo \
#       --query clientId --output tsv
# =============================================================================
apiVersion: v1
kind: ServiceAccount
metadata:
  name: order-processor-sa
  namespace: keda-dotnet-sample
  labels:
    # Required label - webhook uses this to decide whether to mutate pods
    azure.workload.identity/use: "true"
  annotations:
    # Tells the webhook which Managed Identity to bind to this ServiceAccount
    azure.workload.identity/client-id: "<MI_CLIENT_ID>"
