# =============================================================================
# demo-2-demo-app.yaml
# KEDA + Prometheus Demo - Application Deployment
#
# Usage:
#   kubectl apply -f demo-2-demo-app.yaml
#
# Prerequisites:
#   - AKS cluster with KEDA add-on enabled
#   - kubectl configured (az aks get-credentials)
#
# What this creates:
#   - Namespace: demo
#   - Deployment: demo-app (replicas: 0 - scale-to-zero intentional)
#   - Service: demo-app (port 80 for traffic, port 8080 for Prometheus scrape)
#
# Image: quay.io/brancz/prometheus-example-app:v0.3.0
#   Exposes http_requests_total counter on /metrics at :8080
#
# Cleanup:
#   kubectl delete namespace demo
# =============================================================================
apiVersion: v1
kind: Namespace
metadata:
  name: demo
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: demo-app
  namespace: demo
  labels:
    app: demo-app
spec:
  replicas: 0
  selector:
    matchLabels:
      app: demo-app
  template:
    metadata:
      labels:
        app: demo-app
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8080"
        prometheus.io/path: "/metrics"
    spec:
      containers:
      - name: demo-app
        image: quay.io/brancz/prometheus-example-app:v0.3.0
        ports:
        - name: http
          containerPort: 8080
        resources:
          requests:
            cpu: 100m
            memory: 64Mi
          limits:
            cpu: 250m
            memory: 128Mi
        readinessProbe:
          httpGet:
            path: /
            port: http
          initialDelaySeconds: 5
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: demo-app
  namespace: demo
  labels:
    app: demo-app
spec:
  selector:
    app: demo-app
  ports:
  - name: http
    port: 80
    targetPort: http
  - name: http-metrics
    port: 8080
    targetPort: http
